apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-slo-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: sli.recording
      interval: 5m
      rules:
        - record: sli:pod_availability:ratio
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="apps"})
            /
            sum(kube_deployment_spec_replicas{namespace="apps"})

        - record: sli:pod_availability:ratio_rate5m
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="apps"})
            /
            sum(kube_deployment_spec_replicas{namespace="apps"})

    - name: error.budget
      interval: 5m
      rules:
        - record: errorbudget:pod_availability:consumed
          expr: |
            clamp(1 - sli:pod_availability:ratio, 0, 1)

        - record: errorbudget:pod_availability:remaining
          expr: |
            clamp(
              1 - (clamp(1 - sli:pod_availability:ratio, 0, 1) / (1 - 0.995)),
              0, 1
            )

    - name: slo.alerting
      rules:
        - alert: PodAvailabilitySLOBreach
          expr: sli:pod_availability:ratio < 0.995
          for: 2m
          labels:
            severity: critical
            slo: pod-availability
          annotations:
            summary: "Pod availability below 99.5% SLO"
            description: >
              Only {{ $value | humanizePercentage }} of desired
              pods are available in namespace apps.
