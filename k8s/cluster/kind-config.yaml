apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: aiops-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
    labels:
      workload: apps
  - role: worker
    labels:
      workload: monitoring
